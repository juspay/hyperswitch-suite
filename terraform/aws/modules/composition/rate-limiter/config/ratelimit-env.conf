# =============================================================================
# Envoy Ratelimit Service Environment Configuration
# =============================================================================

# Logging Configuration
LOG_LEVEL=info
LOG_FORMAT=text

# Server Configuration
PORT=8080
GRPC_PORT=8081
USE_STATSD=false
STATSD_HOST=localhost
STATSD_PORT=8125

# Redis Configuration
# These will be populated from the ElastiCache outputs
REDIS_SOCKET_TYPE=tcp
REDIS_URL=${REDIS_URL}
REDIS_POOL_SIZE=10

# Redis Pipeline Configuration
REDIS_PIPELINE_WINDOW=1000ms
REDIS_PIPELINE_LIMIT=8

# Local Cache Configuration
LOCAL_CACHE_SIZE_IN_BYTES=0
NEAR_LIMIT_RATIO=0.8

# Stats Configuration
STATSD_PROTOCOL=udp
STATSD_FLUSH_INTERVAL_SECONDS=5

# Tracing Configuration
TRACING_SERVICE_NAME=ratelimit
TRACING_BACKEND=noop

# Runtime Configuration
RUNTIME_ROOT=/srv/runtime_data/current
RUNTIME_SUBDIRECTORY=
RUNTIME_IGNOREDOTFILES=false
RUNTIME_WATCH_ROOT=true

# Metrics Configuration
METRICS_TYPE=prometheus
METRICS_PREFIX=ratelimit
