# =============================================================================
# Envoy Ratelimit Configuration
# Reference: https://github.com/envoyproxy/ratelimit#configuration
# =============================================================================

# Domain for the rate limit service
domain: ratelimit

# Descriptors define rate limits for different request attributes
descriptors:
  # Generic request limits
  - key: generic_key
    value: default
    rate_limit:
      unit: second
      requests_per_unit: 1000

  # Remote address based limits
  - key: remote_address
    rate_limit:
      unit: minute
      requests_per_unit: 60

  # Header based limits
  - key: header_match
    value: x-api-key
    rate_limit:
      unit: minute
      requests_per_unit: 100

  # Path based limits  
  - key: path
    value: /api/v1/health
    rate_limit:
      unit: second
      requests_per_unit: 100

  # Method based limits
  - key: method
    value: POST
    rate_limit:
      unit: minute
      requests_per_unit: 30

  # Nested descriptors for more granular control
  - key: header_match
    value: x-api-key
    descriptors:
      - key: method
        value: POST
        rate_limit:
          unit: minute
          requests_per_unit: 20

  # Hyperswitch specific limits
  - key: generic_key
    value: hyperswitch_api
    rate_limit:
      unit: second
      requests_per_unit: 5000

  - key: generic_key
    value: hyperswitch_payment
    rate_limit:
      unit: minute
      requests_per_unit: 1000

# Shadow mode - set to true to only log violations without blocking
shadow_mode: false

# Enable debug mode for detailed logging
enable_debug: false
